name: CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    name: Backend Maven tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        run: ./mvnw -B test

  playwright:
    name: Playwright API tests
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Install Playwright dependencies
        working-directory: playwright
        run: npm ci

      - name: Start Spring Boot API for Playwright
        run: |
          ./mvnw -B -DskipTests -Dspring-boot.run.useTestClasspath=true \
            -Dspring-boot.run.arguments="--server.port=8080 --server.servlet.context-path=/api --spring.datasource.url=jdbc:h2:mem:bookingya;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE --spring.datasource.driver-class-name=org.h2.Driver --spring.datasource.username=sa --spring.datasource.password= --spring.jpa.hibernate.ddl-auto=create-drop --spring.jpa.show-sql=false" \
            spring-boot:run > spring-boot.log 2>&1 &
          echo $! > spring-boot.pid

      - name: Wait for API readiness
        run: |
          for i in {1..60}; do
            if curl --fail --silent http://localhost:8080/api/room > /dev/null; then
              echo "Spring Boot API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Spring Boot API did not become ready in time"
          cat spring-boot.log
          exit 1

      - name: Run Playwright API tests
        working-directory: playwright
        run: npm test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright/playwright-report
          if-no-files-found: ignore

      - name: Upload Spring Boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-log
          path: spring-boot.log
          if-no-files-found: ignore